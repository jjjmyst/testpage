<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Static Site Test</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.45;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #e5e7eb;
    }
    .card {
      width: min(720px, calc(100% - 32px));
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 12px; color: rgba(229,231,235,.9); }
    code {
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.12);
      padding: 2px 6px;
      border-radius: 8px;
    }
    .meta {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      font-size: 14px;
      color: rgba(229,231,235,.85);
    }
    .ok {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(34,197,94,.16);
      border: 1px solid rgba(34,197,94,.35);
      color: rgba(220,252,231,.95);
      font-weight: 600;
      font-size: 13px;
    }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <main class="card">
    <h1>It works ✅</h1>
    <p>This page is a quick test file for GitHub Pages (or any static host).</p>
    <p>If you can see this, your DNS + hosting path is correct.</p>

    <div class="meta">
      <div><strong>Host:</strong> <code id="host">…</code></div>
      <div><strong>Protocol:</strong> <code id="proto">…</code></div>
      <div><strong>Path:</strong> <code id="path">…</code></div>
      <div><strong>Loaded:</strong> <code id="ts">…</code></div>
    </div>

    <div class="ok">Static HTML served successfully</div>

    <p style="margin-top:14px;">
      Tip: If you’re testing redirects, try both <code>www</code> and apex, and both <code>http</code>/<code>https</code>.
    </p>
  </main>

  <script>
    document.getElementById("host").textContent = location.host || "(none)";
    document.getElementById("proto").textContent = location.protocol || "(none)";
    document.getElementById("path").textContent = location.pathname + location.search + location.hash;
    document.getElementById("ts").textContent = new Date().toISOString();
  </script>
</body>
</html>
